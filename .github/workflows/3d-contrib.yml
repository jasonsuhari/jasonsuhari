name: 3D Contribution Calendar

on:
  schedule:
    - cron: "0 1 * * *" # runs daily at 1:00 UTC
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: profile-commit
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    name: Generate 3D Contribution Calendar
    steps:
      - uses: actions/checkout@v4

      - uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: jasonsuhari

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "chore: update 3D contribution calendar"
          git fetch origin main
          git rebase origin/main || { git rebase --abort; echo 'rebase failed'; exit 1; }
          git push
