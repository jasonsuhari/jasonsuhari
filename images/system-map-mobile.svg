<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 850" width="600" height="850" role="img" aria-labelledby="title desc">
  <title id="title">Jason Matthew Suhari project constellation for mobile</title>
  <desc id="desc">A vertical animated systems map connecting GridBash to Fluent, Orangeboard, Faultline, Godot MCP, and grift.</desc>

  <style>
    .surface { fill: #0d1117; }
    .panel { fill: #161b22; stroke: #30363d; }
    .rule, .grid-line, .route-base { stroke: #30363d; }
    .route-flow {
      stroke: #d29922;
      stroke-width: 3;
      stroke-dasharray: 5 18;
      animation: route 3.6s linear infinite;
    }
    .text { fill: #e6edf3; }
    .muted { fill: #8b949e; }
    .accent { fill: #d29922; }
    .label { font: 700 22px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; letter-spacing: 1px; }
    .sub { font: 500 15px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; letter-spacing: .6px; }
    .micro { font: 600 13px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; letter-spacing: 1.4px; }
    .core { font: 800 34px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; letter-spacing: 3px; }
    .breathe { animation: breathe 3.2s ease-in-out infinite; }

    @keyframes route { to { stroke-dashoffset: -46; } }
    @keyframes breathe { 50% { opacity: .38; } }

    @media (prefers-color-scheme: light) {
      .surface { fill: #f6f8fa; }
      .panel { fill: #ffffff; stroke: #d0d7de; }
      .rule, .grid-line, .route-base { stroke: #d0d7de; }
      .text { fill: #1f2328; }
      .muted { fill: #656d76; }
      .accent { fill: #9a6700; }
      .route-flow { stroke: #9a6700; }
    }

    @media (prefers-reduced-motion: reduce) {
      .motion { display: none; }
      .route-flow, .breathe { animation: none; }
    }
  </style>

  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" class="grid-line" stroke-width="1" opacity=".2"/>
    </pattern>
    <linearGradient id="scan" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#d29922" stop-opacity="0"/>
      <stop offset=".5" stop-color="#d29922" stop-opacity=".16"/>
      <stop offset="1" stop-color="#d29922" stop-opacity="0"/>
    </linearGradient>
    <path id="spine" d="M300 190V748"/>
  </defs>

  <rect width="600" height="850" rx="18" class="surface"/>
  <rect x="1" y="1" width="598" height="848" rx="17" fill="none" class="rule"/>
  <rect x="20" y="78" width="560" height="742" rx="12" fill="url(#grid)"/>

  <text x="30" y="43" class="text label">PROJECT CONSTELLATION</text>
  <line x1="30" y1="61" x2="570" y2="61" class="rule"/>

  <path d="M300 190V748" fill="none" class="route-base" stroke-width="3"/>
  <path d="M300 190V748" fill="none" class="route-flow"/>

  <g class="motion" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin=".1s" dur=".01s" fill="freeze"/>
    <circle r="5" class="accent"><animateMotion dur="4.8s" repeatCount="indefinite"><mpath href="#spine"/></animateMotion></circle>
    <circle r="5" class="accent"><animateMotion dur="4.8s" begin="-2.4s" repeatCount="indefinite"><mpath href="#spine"/></animateMotion></circle>
  </g>

  <g>
    <rect x="50" y="92" width="500" height="110" rx="12" class="panel" stroke-width="2"/>
    <rect x="50" y="92" width="7" height="110" rx="3" class="accent"/>
    <text x="300" y="139" text-anchor="middle" class="text core">GRIDBASH</text>
    <text x="300" y="169" text-anchor="middle" class="muted sub">RUST MULTI-AGENT TERMINAL GRID</text>
    <text x="300" y="189" text-anchor="middle" class="accent micro">PRIMARY SYSTEM</text>
  </g>

  <g>
    <rect x="70" y="230" width="460" height="84" rx="12" class="panel"/>
    <rect x="70" y="230" width="6" height="84" rx="3" class="accent"/>
    <text x="98" y="266" class="text label">FLUENT</text>
    <text x="98" y="291" class="muted sub">ACCESSIBLE COMPUTER USE</text>
  </g>

  <g>
    <rect x="70" y="344" width="460" height="84" rx="12" class="panel"/>
    <rect x="70" y="344" width="6" height="84" rx="3" class="accent"/>
    <text x="98" y="380" class="text label">ORANGEBOARD</text>
    <text x="98" y="405" class="muted sub">AI + GEOSPATIAL SALES</text>
  </g>

  <g>
    <rect x="70" y="458" width="460" height="84" rx="12" class="panel"/>
    <rect x="70" y="458" width="6" height="84" rx="3" class="accent"/>
    <text x="98" y="494" class="text label">FAULTLINE</text>
    <text x="98" y="519" class="muted sub">FLOOD-RESILIENCE AGENTS</text>
  </g>

  <g>
    <rect x="70" y="572" width="460" height="84" rx="12" class="panel"/>
    <rect x="70" y="572" width="6" height="84" rx="3" class="accent"/>
    <text x="98" y="608" class="text label">GODOT MCP</text>
    <text x="98" y="633" class="muted sub">16 AI GAME-ENGINE TOOLS</text>
  </g>

  <g>
    <rect x="70" y="686" width="460" height="84" rx="12" class="panel"/>
    <rect x="70" y="686" width="6" height="84" rx="3" class="accent"/>
    <text x="98" y="722" class="text label">GRIFT</text>
    <text x="98" y="747" class="muted sub">CLAUDE ACCOUNT SWITCHER</text>
  </g>

  <g opacity=".55" class="motion">
    <rect x="26" y="88" width="548" height="2" fill="url(#scan)">
      <animate attributeName="y" values="88;805;88" dur="8s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
