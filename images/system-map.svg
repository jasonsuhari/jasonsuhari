<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 690" width="1200" height="690" role="img" aria-labelledby="title desc">
  <title id="title">Jason Matthew Suhari project constellation</title>
  <desc id="desc">An animated systems map connecting GridBash to Fluent, Orangeboard, Faultline, Godot MCP, and grift.</desc>

  <style>
    .surface { fill: #0d1117; }
    .panel { fill: #161b22; stroke: #30363d; }
    .grid-line { stroke: #30363d; }
    .rule { stroke: #30363d; }
    .link-base { fill: none; stroke: #30363d; stroke-width: 2; }
    .link-flow {
      fill: none;
      stroke: #d29922;
      stroke-width: 2;
      stroke-dasharray: 5 19;
      animation: route 4s linear infinite;
    }
    .ring { fill: none; stroke: #d29922; }
    .text { fill: #e6edf3; }
    .muted { fill: #8b949e; }
    .accent { fill: #d29922; }
    .accent-stroke { stroke: #d29922; }
    .label { font: 700 17px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; letter-spacing: 1px; }
    .sub { font: 500 12px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; letter-spacing: .8px; }
    .micro { font: 600 10px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; letter-spacing: 1.8px; }
    .core-title { font: 800 31px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; letter-spacing: 3px; }
    .rotate-slow { transform-origin: 600px 350px; animation: spin 24s linear infinite; }
    .rotate-back { transform-origin: 600px 350px; animation: spin-back 17s linear infinite; }
    .breathe { animation: breathe 3.2s ease-in-out infinite; }

    @keyframes route { to { stroke-dashoffset: -48; } }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes spin-back { to { transform: rotate(-360deg); } }
    @keyframes breathe { 50% { opacity: .32; } }

    @media (prefers-color-scheme: light) {
      .surface { fill: #f6f8fa; }
      .panel { fill: #ffffff; stroke: #d0d7de; }
      .grid-line, .rule, .link-base { stroke: #d0d7de; }
      .text { fill: #1f2328; }
      .muted { fill: #656d76; }
      .accent { fill: #9a6700; }
      .accent-stroke, .ring, .link-flow { stroke: #9a6700; }
    }

    @media (prefers-reduced-motion: reduce) {
      .motion { display: none; }
      .link-flow, .rotate-slow, .rotate-back, .breathe { animation: none; }
    }

    @media (max-width: 600px) {
      .label { font-size: 21px; }
      .core-title { font-size: 35px; }
      .sub, .micro { display: none; }
    }
  </style>

  <defs>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0V44" fill="none" class="grid-line" stroke-width="1" opacity=".24"/>
    </pattern>
    <radialGradient id="core-wash" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#d29922" stop-opacity=".13"/>
      <stop offset="1" stop-color="#d29922" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="scan-fade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#d29922" stop-opacity="0"/>
      <stop offset=".5" stop-color="#d29922" stop-opacity=".18"/>
      <stop offset="1" stop-color="#d29922" stop-opacity="0"/>
    </linearGradient>

    <path id="route-fluent" d="M600 300C600 245 600 220 600 168"/>
    <path id="route-orangeboard" d="M734 334C802 309 842 269 890 234"/>
    <path id="route-faultline" d="M716 406C780 441 826 478 878 503"/>
    <path id="route-grift" d="M600 405C600 470 600 515 600 570"/>
    <path id="route-godot" d="M472 395C393 430 335 474 294 510"/>
  </defs>

  <rect width="1200" height="690" rx="18" class="surface"/>
  <rect x="1" y="1" width="1198" height="688" rx="17" fill="none" class="rule"/>
  <rect x="20" y="84" width="1160" height="574" rx="12" fill="url(#grid)"/>

  <text x="46" y="47" class="text label">PROJECT CONSTELLATION</text>
  <text x="1154" y="47" text-anchor="end" class="muted micro">JASON MATTHEW SUHARI</text>
  <line x1="46" y1="65" x2="1154" y2="65" class="rule"/>

  <ellipse cx="600" cy="350" rx="252" ry="230" fill="url(#core-wash)"/>

  <path d="M600 300C600 245 600 220 600 168" class="link-base"/>
  <path d="M734 334C802 309 842 269 890 234" class="link-base"/>
  <path d="M716 406C780 441 826 478 878 503" class="link-base"/>
  <path d="M600 405C600 470 600 515 600 570" class="link-base"/>
  <path d="M472 395C393 430 335 474 294 510" class="link-base"/>

  <path d="M600 300C600 245 600 220 600 168" class="link-flow"/>
  <path d="M734 334C802 309 842 269 890 234" class="link-flow" style="animation-delay:-.8s"/>
  <path d="M716 406C780 441 826 478 878 503" class="link-flow" style="animation-delay:-1.6s"/>
  <path d="M600 405C600 470 600 515 600 570" class="link-flow" style="animation-delay:-2.4s"/>
  <path d="M472 395C393 430 335 474 294 510" class="link-flow" style="animation-delay:-3.2s"/>

  <g class="motion" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin=".1s" dur=".01s" fill="freeze"/>
    <circle r="4" class="accent"><animateMotion dur="3.1s" repeatCount="indefinite"><mpath href="#route-fluent"/></animateMotion></circle>
    <circle r="4" class="accent"><animateMotion dur="3.8s" begin="-.9s" repeatCount="indefinite"><mpath href="#route-orangeboard"/></animateMotion></circle>
    <circle r="4" class="accent"><animateMotion dur="4.2s" begin="-2.1s" repeatCount="indefinite"><mpath href="#route-faultline"/></animateMotion></circle>
    <circle r="4" class="accent"><animateMotion dur="3.5s" begin="-1.4s" repeatCount="indefinite"><mpath href="#route-grift"/></animateMotion></circle>
    <circle r="4" class="accent"><animateMotion dur="4.5s" begin="-3.2s" repeatCount="indefinite"><mpath href="#route-godot"/></animateMotion></circle>
  </g>

  <g class="rotate-slow" opacity=".7">
    <circle cx="600" cy="350" r="164" class="ring" stroke-width="1" stroke-dasharray="2 14"/>
    <path d="M600 178V198M600 502V522M428 350H448M752 350H772" class="accent-stroke" stroke-width="2"/>
  </g>
  <g class="rotate-back" opacity=".45">
    <circle cx="600" cy="350" r="132" class="ring" stroke-width="1" stroke-dasharray="36 22"/>
  </g>
  <circle cx="600" cy="350" r="105" class="ring breathe" stroke-width="1" opacity=".62"/>

  <g>
    <rect x="452" y="299" width="296" height="106" rx="12" class="panel" stroke-width="2"/>
    <rect x="452" y="299" width="6" height="106" rx="3" class="accent"/>
    <text x="600" y="344" text-anchor="middle" class="text core-title">GRIDBASH</text>
    <text x="600" y="373" text-anchor="middle" class="muted sub">RUST MULTI-AGENT TERMINAL GRID</text>
    <text x="600" y="390" text-anchor="middle" class="accent micro">PRIMARY SYSTEM</text>
  </g>

  <g>
    <rect x="486" y="88" width="228" height="80" rx="12" class="panel"/>
    <rect x="486" y="88" width="5" height="80" rx="3" class="accent"/>
    <text x="510" y="122" class="text label">FLUENT</text>
    <text x="510" y="145" class="muted sub">ACCESSIBLE COMPUTER USE</text>
  </g>

  <g>
    <rect x="890" y="190" width="250" height="88" rx="12" class="panel"/>
    <rect x="890" y="190" width="5" height="88" rx="3" class="accent"/>
    <text x="914" y="226" class="text label">ORANGEBOARD</text>
    <text x="914" y="250" class="muted sub">AI + GEOSPATIAL SALES</text>
  </g>

  <g>
    <rect x="878" y="464" width="262" height="88" rx="12" class="panel"/>
    <rect x="878" y="464" width="5" height="88" rx="3" class="accent"/>
    <text x="902" y="500" class="text label">FAULTLINE</text>
    <text x="902" y="524" class="muted sub">FLOOD-RESILIENCE AGENTS</text>
  </g>

  <g>
    <rect x="486" y="570" width="228" height="72" rx="12" class="panel"/>
    <rect x="486" y="570" width="5" height="72" rx="3" class="accent"/>
    <text x="510" y="601" class="text label">GRIFT</text>
    <text x="510" y="623" class="muted sub">CLAUDE ACCOUNT SWITCHER</text>
  </g>

  <g>
    <rect x="60" y="464" width="234" height="88" rx="12" class="panel"/>
    <rect x="60" y="464" width="5" height="88" rx="3" class="accent"/>
    <text x="84" y="500" class="text label">GODOT MCP</text>
    <text x="84" y="524" class="muted sub">16 AI GAME-ENGINE TOOLS</text>
  </g>

  <g opacity=".55" class="motion">
    <rect x="44" y="105" width="1112" height="2" fill="url(#scan-fade)">
      <animate attributeName="y" values="105;638;105" dur="8s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
